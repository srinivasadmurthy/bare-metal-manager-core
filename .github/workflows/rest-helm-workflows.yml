name: Helm Charts

on:
  workflow_call:
    inputs:
      ngc_path:
        required: false
        type: string
        default: ''
      app_version:
        description: "Application version for Helm chart appVersion"
        required: true
        type: string
      chart_version:
        description: "Helm chart version (SemVer-strict, derived from git describe). Aligned with core's helm_version."
        required: true
        type: string
    secrets:
      NVCR_STG_TOKEN:
        required: true
      NICO_NGC_TOKEN:
        required: false

jobs:
  validate-charts:
    name: Validate Helm Charts
    if: ${{ !cancelled() && github.event_name != 'schedule' }}
    runs-on: linux-amd64-cpu4
    strategy:
      matrix:
        include:
          - chart: helm/rest/nico-rest
            valueOverrides: '["nico-rest-api.config.keycloak.enabled=true","nico-rest-api.config.keycloak.baseURL=http://keycloak:8082","nico-rest-api.config.keycloak.realm=test","nico-rest-api.config.keycloak.clientID=test"]'
          - chart: helm/rest/nico-rest-site-agent
            valueOverrides: '[]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate Helm chart
        uses: NVIDIA/dsx-github-actions/.github/actions/helm-validate@94bde998f5d7965576b0c663db7d5d709c918167
        with:
          chart-path: ${{ matrix.chart }}
          lint: 'true'
          template: 'true'
          valueOverrides: ${{ matrix.valueOverrides }}

  push-charts:
    name: Push Helm Charts
    needs:
      - validate-charts
    if: ${{ !cancelled() && github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' && needs.validate-charts.result == 'success' && !contains(github.ref, 'pull-request/') }}
    runs-on: linux-amd64-cpu4
    strategy:
      matrix:
        chart:
          - helm/rest/nico-rest
          - helm/rest/nico-rest-site-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Package and push Helm chart to NGC
        if: ${{ inputs.ngc_path != '' }}
        uses: NVIDIA/dsx-github-actions/.github/actions/helm-package-push@7de619729962a6bd5e8355b6fb3582a22517d7e5
        with:
          chart-path: ${{ matrix.chart }}
          chart-version: ${{ inputs.chart_version }}
          app-version: ${{ inputs.app_version }}
          lint: 'false'
          ngc-key: ${{ secrets.NICO_NGC_TOKEN || secrets.NVCR_STG_TOKEN }}
          ngc-path: ${{ inputs.ngc_path }}
          ngc-duplicate: fail
