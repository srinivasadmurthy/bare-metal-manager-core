name: Build and Push Service

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner type for the build job (amd64; arm64 leg uses a fixed arm64 runner)'
        required: false
        default: 'linux-amd64-cpu4'
        type: string
      service_name:
        description: 'Service name (e.g., nico-rest-api)'
        required: true
        type: string
      binary_name:
        description: 'Binary name in artifacts (e.g., api, migrations, sitemgr)'
        required: true
        type: string
      binary_path:
        description: 'Path to binary in container (e.g., /app/api)'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      semantic_version:
        description: 'Semantic version from VERSION file'
        required: true
        type: string
      short_sha:
        description: 'Short SHA for tagging'
        required: true
        type: string
      branch_sha_tag:
        description: 'Combined branch name and short SHA tag'
        required: true
        type: string
      target_registry:
        description: 'Target NVCR registry path'
        required: true
        type: string
      push_enabled:
        description: 'Whether to push images to registry'
        required: true
        type: boolean
      is_main_branch:
        description: 'Whether this is the main branch'
        required: true
        type: string
      release_tag:
        description: 'Release tag for the build'
        required: false
        default: ""
        type: string
      ngc_path:
        description: 'NGC org/team for resource uploads (empty = skip)'
        required: false
        type: string
        default: ''
    secrets:
      NVCR_USERNAME:
        description: 'NVCR username'
        required: false
      NVCR_TOKEN:
        description: 'NVCR token'
        required: false
      NICO_TARGET_REGISTRY_USERNAME:
        description: "Username for the push target registry (falls back to NVCR_USERNAME)"
        required: false
      NICO_TARGET_REGISTRY_TOKEN:
        description: "Token for the push target registry (falls back to NVCR_TOKEN)"
        required: false
      NICO_NGC_TOKEN:
        description: "Key for NGC helm/resource uploads (falls back to NVCR_TOKEN)"
        required: false

jobs:
  # Build each architecture natively on its own runner. A single multi-platform
  # build does NOT work here: the Dockerfile builder is `FROM --platform=$BUILDPLATFORM`,
  # so BuildKit builds it once on the build host (amd64) and BOTH final stages
  # `COPY --from=builder`, shipping the amd64 binary inside the arm64 image. Building
  # each arch on its own runner (separate, single-platform builds) is the only way to
  # guarantee the arm64 image contains an arm64 binary; the manifest is stitched in `merge`.
  build:
    name: Build ${{ inputs.service_name }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: linux-amd64-cpu4
          - arch: arm64
            platform: linux/arm64
            runner: linux-arm64-cpu4
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Point BuildKit at the runner's prepopulated Docker mirror config so base-image
          # pulls (e.g. golang) go through the IPP pull-through cache instead of Docker Hub
          # directly — avoids unauthenticated 429 rate limits. Matches core docker-build.yml.
          buildkitd-config: /etc/buildkit/buildkitd.toml

      - name: Derive registry host
        id: registry-host
        env:
          TARGET_REGISTRY: ${{ inputs.target_registry }}
          PUSH_ENABLED: ${{ inputs.push_enabled }}
          HAS_TARGET_TOKEN: ${{ secrets.NICO_TARGET_REGISTRY_TOKEN != '' }}
          HAS_TARGET_USERNAME: ${{ secrets.NICO_TARGET_REGISTRY_USERNAME != '' }}
        run: |
          HOST="${TARGET_REGISTRY%%/*}"
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          if [ "${PUSH_ENABLED}" = "true" ] && [ "${HOST}" != "nvcr.io" ] && { [ "${HAS_TARGET_TOKEN}" != "true" ] || [ "${HAS_TARGET_USERNAME}" != "true" ]; }; then
            echo "::error::pushing to a non-NVCR target requires NICO_TARGET_REGISTRY_* secrets"
            exit 1
          fi

      - name: Determine Docker tags
        id: docker-tags
        run: |
          # semantic_version comes from `git describe --long` and already ends in `-g<short_sha>`,
          # so appending short_sha again would produce a duplicated SHA suffix.
          ARTIFACT_VERSION="${{ inputs.semantic_version }}"
          if [ "${{ inputs.is_main_branch }}" == "true" ]; then
            PRIMARY_TAG="${{ inputs.semantic_version }}"
          elif [ "${{ inputs.release_tag }}" != "" ]; then
            PRIMARY_TAG="${{ inputs.release_tag }}"
            ARTIFACT_VERSION="${{ inputs.release_tag }}"
          else
            PRIMARY_TAG="${{ inputs.branch_sha_tag }}"
          fi
          # Per-arch tag; the bare manifest tag is assembled by the merge job.
          ARCH_TAG="${{ inputs.target_registry }}/${{ inputs.service_name }}:${PRIMARY_TAG}-${{ matrix.arch }}"
          echo "primary_tag=$PRIMARY_TAG" >> $GITHUB_OUTPUT
          echo "arch_tag=$ARCH_TAG" >> $GITHUB_OUTPUT
          echo "artifact_version=$ARTIFACT_VERSION" >> $GITHUB_OUTPUT

      - name: Build ${{ inputs.service_name }} (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: ./rest-api
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          # The Dockerfile builder is FROM --platform=$BUILDPLATFORM and cross-compiles via
          # GOARCH=$TARGETARCH. On a NATIVE single-platform build BuildKit does not inject the
          # automatic TARGETARCH, so it falls back to the Dockerfile default (amd64) and the
          # arm64 leg cross-compiles to amd64 even on an arm64 runner. Set it explicitly.
          build-args: |
            TARGETOS=linux
            TARGETARCH=${{ matrix.arch }}
            VERSION=${{ steps.docker-tags.outputs.primary_tag }}
          tags: ${{ steps.docker-tags.outputs.arch_tag }}
          cache-from: type=gha,scope=${{ inputs.service_name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service_name }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=${{ inputs.service_name }}
            org.opencontainers.image.version=${{ inputs.semantic_version }}
            org.opencontainers.image.revision=${{ inputs.short_sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.url=${{ github.repositoryUrl }}

      - name: Grype vulnerability scan
        if: matrix.arch == 'amd64'
        continue-on-error: true
        uses: NVIDIA/dsx-github-actions/.github/actions/security-container-scan@aa4e470cc53f3886545c7d72a984eb81f1d203e2 # v1.16.2
        with:
          image: ${{ steps.docker-tags.outputs.arch_tag }}
          fail-on: critical
          fail-build: 'false'
          write-summary: 'false'
          upload-sarif: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          sarif-category: grype-${{ inputs.service_name }}
          artifact-name: grype-${{ inputs.service_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          sbom-artifact-name: sbom-${{ inputs.service_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Extract ${{ matrix.arch }} binary and verify architecture
        # No push_enabled gate: the build step loads the image, so this guard also runs on PRs
        # and catches an arch mismatch before merge — not only on main.
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cid=$(docker create "${{ steps.docker-tags.outputs.arch_tag }}")
          docker cp "${cid}:${{ inputs.binary_path }}" "artifacts/${{ inputs.binary_name }}-${{ matrix.arch }}"
          docker rm "${cid}"
          chmod +x "artifacts/${{ inputs.binary_name }}-${{ matrix.arch }}"
          # Guard: the binary must match this leg's target arch (amd64=x86-64, arm64=aarch64).
          case "${{ matrix.arch }}" in
            amd64) want='x86-64' ;;
            arm64) want='aarch64' ;;
            *) echo "::error::unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          got="$(file -b "artifacts/${{ inputs.binary_name }}-${{ matrix.arch }}")"
          echo "${got}" | grep -q "${want}" \
            || { echo "::error::${{ matrix.arch }} ${{ inputs.binary_name }} is not ${want}: ${got}"; exit 1; }

      - name: Login to target registry
        if: ${{ inputs.push_enabled == true }}
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry-host.outputs.host }}
          username: ${{ secrets.NICO_TARGET_REGISTRY_USERNAME || secrets.NVCR_USERNAME }}
          password: ${{ secrets.NICO_TARGET_REGISTRY_TOKEN || secrets.NVCR_TOKEN }}

      - name: Push ${{ matrix.arch }} image
        if: inputs.push_enabled == true
        run: docker push "${{ steps.docker-tags.outputs.arch_tag }}"

      - name: Upload binary artifact with semantic version
        if: inputs.push_enabled == true && inputs.ngc_path != ''
        uses: NVIDIA/dsx-github-actions/.github/actions/resource-push-ngc@ae74448cafa69f20fe0011c5351c2a864a8f632d
        with:
          name: ${{ inputs.service_name }}-binary-${{ matrix.arch }}
          display-name: ${{ inputs.service_name }}-binary-${{ matrix.arch }}
          description: ${{ inputs.service_name }} binary (${{ matrix.arch }})
          version: ${{ steps.docker-tags.outputs.artifact_version }}
          path: artifacts/${{ inputs.binary_name }}-${{ matrix.arch }}
          ngc-path: ${{ inputs.ngc_path }}
          ngc-key: ${{ secrets.NICO_NGC_TOKEN || secrets.NVCR_TOKEN }}

      - name: Upload binary artifact with latest tag
        if: inputs.is_main_branch == 'true' && inputs.push_enabled == true && inputs.ngc_path != ''
        uses: NVIDIA/dsx-github-actions/.github/actions/resource-push-ngc@ae74448cafa69f20fe0011c5351c2a864a8f632d
        with:
          name: ${{ inputs.service_name }}-binary-${{ matrix.arch }}
          display-name: ${{ inputs.service_name }}-binary-${{ matrix.arch }}
          description: ${{ inputs.service_name }} binary (${{ matrix.arch }})
          version: latest
          path: artifacts/${{ inputs.binary_name }}-${{ matrix.arch }}
          ngc-path: ${{ inputs.ngc_path }}
          ngc-key: ${{ secrets.NICO_NGC_TOKEN || secrets.NVCR_TOKEN }}

  # Stitch the per-arch images pushed by `build` into one multi-arch manifest at the
  # bare tag, then export/upload the image tarball. Push refs only.
  merge:
    name: Merge ${{ inputs.service_name }} manifest
    needs: build
    if: ${{ inputs.push_enabled == true }}
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive registry host
        id: registry-host
        env:
          TARGET_REGISTRY: ${{ inputs.target_registry }}
          PUSH_ENABLED: ${{ inputs.push_enabled }}
          HAS_TARGET_TOKEN: ${{ secrets.NICO_TARGET_REGISTRY_TOKEN != '' }}
          HAS_TARGET_USERNAME: ${{ secrets.NICO_TARGET_REGISTRY_USERNAME != '' }}
        run: |
          HOST="${TARGET_REGISTRY%%/*}"
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          if [ "${PUSH_ENABLED}" = "true" ] && [ "${HOST}" != "nvcr.io" ] && { [ "${HAS_TARGET_TOKEN}" != "true" ] || [ "${HAS_TARGET_USERNAME}" != "true" ]; }; then
            echo "::error::pushing to a non-NVCR target requires NICO_TARGET_REGISTRY_* secrets"
            exit 1
          fi

      - name: Login to target registry
        if: ${{ inputs.push_enabled == true }}
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry-host.outputs.host }}
          username: ${{ secrets.NICO_TARGET_REGISTRY_USERNAME || secrets.NVCR_USERNAME }}
          password: ${{ secrets.NICO_TARGET_REGISTRY_TOKEN || secrets.NVCR_TOKEN }}

      - name: Determine Docker tags
        id: docker-tags
        run: |
          ARTIFACT_VERSION="${{ inputs.semantic_version }}"
          if [ "${{ inputs.is_main_branch }}" == "true" ]; then
            PRIMARY_TAG="${{ inputs.semantic_version }}"
          elif [ "${{ inputs.release_tag }}" != "" ]; then
            PRIMARY_TAG="${{ inputs.release_tag }}"
            ARTIFACT_VERSION="${{ inputs.release_tag }}"
          else
            PRIMARY_TAG="${{ inputs.branch_sha_tag }}"
          fi
          echo "primary_tag=$PRIMARY_TAG" >> $GITHUB_OUTPUT
          echo "artifact_version=$ARTIFACT_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 20
          command: |
            REG="${{ inputs.target_registry }}/${{ inputs.service_name }}"
            TAG="${{ steps.docker-tags.outputs.primary_tag }}"
            docker buildx imagetools create -t "${REG}:${TAG}" "${REG}:${TAG}-amd64" "${REG}:${TAG}-arm64"
            if [ "${{ inputs.is_main_branch }}" == "true" ]; then
              docker buildx imagetools create -t "${REG}:latest" "${REG}:${TAG}-amd64" "${REG}:${TAG}-arm64"
            fi

      - name: Export Docker image
        run: |
          set -euo pipefail
          mkdir -p artifacts
          docker pull "${{ inputs.target_registry }}/${{ inputs.service_name }}:${{ steps.docker-tags.outputs.primary_tag }}"
          docker save "${{ inputs.target_registry }}/${{ inputs.service_name }}:${{ steps.docker-tags.outputs.primary_tag }}" \
            | gzip > "artifacts/${{ inputs.service_name }}-${{ steps.docker-tags.outputs.artifact_version }}.tar.gz"

      - name: Upload Docker image artifact with semantic version
        if: inputs.ngc_path != ''
        uses: NVIDIA/dsx-github-actions/.github/actions/resource-push-ngc@ae74448cafa69f20fe0011c5351c2a864a8f632d
        with:
          name: ${{ inputs.service_name }}-image
          display-name: ${{ inputs.service_name }}-image
          description: ${{ inputs.service_name }} image
          version: ${{ steps.docker-tags.outputs.artifact_version }}
          path: artifacts/${{ inputs.service_name }}-${{ steps.docker-tags.outputs.artifact_version }}.tar.gz
          ngc-path: ${{ inputs.ngc_path }}
          ngc-key: ${{ secrets.NICO_NGC_TOKEN || secrets.NVCR_TOKEN }}

      - name: Upload Docker image artifact with latest tag
        if: inputs.is_main_branch == 'true' && inputs.ngc_path != ''
        uses: NVIDIA/dsx-github-actions/.github/actions/resource-push-ngc@ae74448cafa69f20fe0011c5351c2a864a8f632d
        with:
          name: ${{ inputs.service_name }}-image
          display-name: ${{ inputs.service_name }}-image
          description: ${{ inputs.service_name }} image
          version: latest
          path: artifacts/${{ inputs.service_name }}-${{ steps.docker-tags.outputs.artifact_version }}.tar.gz
          ngc-path: ${{ inputs.ngc_path }}
          ngc-key: ${{ secrets.NICO_NGC_TOKEN || secrets.NVCR_TOKEN }}
