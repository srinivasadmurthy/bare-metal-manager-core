apiVersion: apps/v1
kind: Deployment
metadata:
  name: nico-api
  namespace: default
  annotations:
    configmap.reloader.stakater.com/reload: "nico-api-config-files,nico-api-site-config-files"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: nico-api
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: nico-api
    spec:
      serviceAccountName: nico-api
      containers:
        - name: nico-api
          image: yourdockerregistry.com/path/to/nico-core:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          # yamllint disable rule:line-length
          command:
            - /bin/sh
            - -c
            # if you change this command, keep it in sync (as appropriate) with the overlay in local-dev for the local workflow
            - /opt/carbide/carbide-api run --config-path /etc/forge/carbide-api/carbide-api-config.toml --site-config-path /etc/forge/carbide-api/site/carbide-api-site-config.toml
          env:
            - name: VAULT_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: nico-vault-approle-tokens
                  key: VAULT_ROLE_ID
                  optional: true
            - name: VAULT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: nico-vault-approle-tokens
                  key: VAULT_SECRET_ID
                  optional: true
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nico-vault-token
                  key: token
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: vault-cluster-info
                  key: VAULT_SERVICE
            - name: VAULT_KV_MOUNT_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: vault-cluster-info
                  key: NICO_VAULT_MOUNT
            - name: VAULT_PKI_MOUNT_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: vault-cluster-info
                  key: NICO_VAULT_PKI_MOUNT
            - name: VAULT_PKI_ROLE_NAME
              value: "nico-cluster"
            - name: DATASTORE_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: nico-system.nico.nico-pg-cluster.credentials
            - name: DATASTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: nico-system.nico.nico-pg-cluster.credentials
            - name: DATASTORE_HOST
              valueFrom:
                configMapKeyRef:
                  name: nico-system-nico-database-config
                  key: DB_HOST
            - name: DATASTORE_PORT
              valueFrom:
                configMapKeyRef:
                  name: nico-system-nico-database-config
                  key: DB_PORT
            - name: DATASTORE_NAME
              valueFrom:
                configMapKeyRef:
                  name: nico-system-nico-database-config
                  key: DB_NAME
            - name: CARBIDE_API_DATABASE_URL # Overwrites `database_url` in carbide-api-config.toml
              value: postgres://$(DATASTORE_USER):$(DATASTORE_PASSWORD)@$(DATASTORE_HOST):$(DATASTORE_PORT)/$(DATASTORE_NAME)
            - name: CARBIDE_WEB_PRIVATE_COOKIEJAR_KEY
              value: $(DATASTORE_PASSWORD)
            # - name: NICO_WEB_OAUTH2_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       key: client_secret
            #       name: azure-sso-nico-web-client-secret
            # - name: CARBIDE_WEB_HOSTNAME
            #   valueFrom:
            #     configMapKeyRef:
            #       name: nico-web-api-hostname
            #       key: hostname
            # Admin UI: omit or NICO_WEB_AUTH_TYPE=none (no in-process auth; use network/proxy).
            # For Entra SSO: NICO_WEB_AUTH_TYPE=oauth2 plus OAuth env vars below.
            # - name: NICO_WEB_AUTH_TYPE
            #   value: oauth2
            - name: BITNAMI_DEBUG
              value: "false"
            - name: RUST_BACKTRACE
              value: "full"
            - name: RUST_LIB_BACKTRACE # See https://doc.rust-lang.org/std/backtrace/index.html#environment-variables
              value: "0"
          ports:
            - name: grpc
              containerPort: 1079
            - name: metrics
              containerPort: 1080
            - name: profiler
              containerPort: 1081
          livenessProbe:
            failureThreshold: 3
            httpGet:
              port: 1080
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 20
          volumeMounts:
            - name: nico-api-config-files
              mountPath: /etc/forge/carbide-api
            - name: nico-api-site-config-files
              mountPath: /etc/forge/carbide-api/site
            - name: persistence
              mountPath: /mnt/persistence
            - name: spiffe
              mountPath: "/var/run/secrets/spiffe.io"
              readOnly: true
            - name: nico-roots
              mountPath: "/var/run/secrets/forge-roots"
              readOnly: true
            - name: nico-roots
              mountPath: "/var/run/secrets/nico-roots"
              readOnly: true
            - name: firmware
              mountPath: "/opt/carbide/firmware"
              readOnly: true

      volumes:
        - name: nico-api-config-files
          configMap:
            name: nico-api-config-files
        - name: nico-api-site-config-files
          configMap:
            name: nico-api-site-config-files
        - name: persistence
          emptyDir: {}
        - name: spiffe
          secret:
            secretName: nico-api-certificate
        - name: nico-roots
          secret:
            secretName: nico-roots
        - name: firmware
          emptyDir: {}
