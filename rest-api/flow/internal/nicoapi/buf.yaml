version: v2
modules:
  - path: nicoproto
lint:
  use:
    - STANDARD
# Ignore the real nico-core-api stuff, which doesn't match the lint definitions at all
  ignore:
    - nicoproto/common.proto
    - nicoproto/nico.proto
    - nicoproto/machine_discovery.proto
    - nicoproto/mlx_device.proto
    - nicoproto/dpa_rpc.proto
    - nicoproto/health.proto
    - nicoproto/measured_boot.proto
    - nicoproto/site_explorer.proto
breaking:
  use:
    - FILE
