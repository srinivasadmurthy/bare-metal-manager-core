{{- if .Values.certificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name }}
  namespace: {{ include "nico-rest-site-agent.namespace" . }}
  labels:
    {{- include "nico-rest-site-agent.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  duration: {{ .Values.certificate.duration }}
  renewBefore: {{ .Values.certificate.renewBefore }}
  {{- if .Values.certificate.subject.organizations }}
  subject:
    organizations:
      {{- toYaml .Values.certificate.subject.organizations | nindent 6 }}
  {{- end }}
  isCA: false
  privateKey:
    algorithm: {{ .Values.certificate.privateKey.algorithm }}
    size: {{ .Values.certificate.privateKey.size }}
  usages:
    - client auth
  dnsNames:
    - {{ include "nico-rest-site-agent.name" . }}
    - {{ include "nico-rest-site-agent.name" . }}.{{ include "nico-rest-site-agent.namespace" . }}
    - {{ include "nico-rest-site-agent.name" . }}.{{ include "nico-rest-site-agent.namespace" . }}.svc.cluster.local
  uris:
    {{- if .Values.certificate.uris }}
    {{- toYaml .Values.certificate.uris | nindent 4 }}
    {{- else }}
    - spiffe://nico.local/{{ include "nico-rest-site-agent.namespace" . }}/sa/{{ include "nico-rest-site-agent.name" . }}
    {{- end }}
  issuerRef:
    name: {{ .Values.global.certificate.issuerRef.name }}
    kind: {{ .Values.global.certificate.issuerRef.kind }}
    group: {{ .Values.global.certificate.issuerRef.group }}
{{- end }}
