apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nico-rest-site-agent.name" . }}-config
  namespace: {{ include "nico-rest-site-agent.namespace" . }}
  labels:
    {{- include "nico-rest-site-agent.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.envConfig }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
