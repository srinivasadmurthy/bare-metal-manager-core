# Overlay for db (migrations) and postgres deployment customization.
# Customize images or add patches for the db Job (migrations) and postgres here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nico-rest

resources:
  - ../../base/db

images:
  - name: nico-rest-db
    newName: localhost:5000/nico-rest-db
    newTag: latest

patches:
  - target:
      kind: Job
      name: nico-rest-db-migration
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
  - target:
      kind: Job
      name: nico-rest-db-migration
    patch: |-
      - op: replace
        path: /metadata/name
        value: nico-rest-db-migration-1-0-2
