# Client certificate for workflow services (API, cloud-worker, site-worker) in nico-rest namespace
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: temporal-client-cloud-cert
  namespace: nico-rest
spec:
  secretName: temporal-client-cloud-certs
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  subject:
    organizations:
      - NVIDIA
  commonName: temporal-client
  isCA: false
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - client auth
  dnsNames:
    - temporal-client
    - nico-rest-api
    - cloud-worker
    - site-worker
  issuerRef:
    name: nico-rest-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
