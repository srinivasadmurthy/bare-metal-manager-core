# CA ClusterIssuer using pre-created CA secret
# Uses the same CA as credsmgr for consistency
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: nico-rest-ca-issuer
spec:
  ca:
    secretName: ca-signing-secret
