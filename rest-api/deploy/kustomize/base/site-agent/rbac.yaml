---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nico-rest-site-agent
  labels:
    app.kubernetes.io/name: nico-rest-site-agent
automountServiceAccountToken: true
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nico-rest-site-agent
  labels:
    app.kubernetes.io/name: nico-rest-site-agent
rules:
  - apiGroups: ["", "cert-manager.io"]
    resources: ["certificaterequests", "secrets"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nico-rest-site-agent
  labels:
    app.kubernetes.io/name: nico-rest-site-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nico-rest-site-agent
subjects:
  - kind: ServiceAccount
    name: nico-rest-site-agent
    namespace: nico-rest
