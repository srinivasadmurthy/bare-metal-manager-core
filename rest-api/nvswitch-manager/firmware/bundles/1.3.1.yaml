# NVSwitch Tray Firmware Bundle 1.3.1
# YTL JHB01 deployment bundle
version: "1.3.1"
description: "NVSwitch Tray Firmware Bundle 1.3.1 for YTL JHB01 deployment"

# Update sequence - components are updated in this order
# BMC first, then CPLD, then BIOS, and finally NVOS
component_order: ["bmc", "cpld", "bios", "nvos"]

components:
  bmc:
    # BMC firmware package (includes ERoT, etc.)
    version: "250710.1.1"
    file: "nvidia/switchtray/1.3.1/nvfw_GB200-P4978_0006_250710.1.1_prod-signed.fwpkg"
    strategy: script
    script: "nvswfwupd.sh"
    script_args: [bmc_ip, bmc_user, bmc_password, fw_file]

  cpld:
    # CPLD firmware - contains CPLD1-4 images
    # CPLD1: REV0600, CPLD2: REV1500, CPLD3: REV1200, CPLD4: REV0400
    version: "REV0600"
    file: "nvidia/switchtray/1.3.1/CPLD_Prod_000370_REV0600_000377_REV1500_000373_REV1200_000390_REV0400_image.bin"
    strategy: script
    script: "nvswupdCPLD.sh"
    script_args: [nvos_ip, nvos_user, nvos_password, fw_file]

  bios:
    # BIOS firmware package
    version: "251104.1.2"
    file: "nvidia/switchtray/1.3.1/nvfw_GB200-P4978_0004_251104.1.2_prod-signed.fwpkg"
    strategy: script
    script: "nvswfwupd.sh"
    script_args: [bmc_ip, bmc_user, bmc_password, fw_file]

  nvos:
    # NVOS operating system image
    # Uses nvswupdNVOS_bundle.sh which power cycles via BMC, waits for NVOS, then updates
    version: "25.02.2452"
    file: "nvidia/switchtray/1.3.1/nvos-amd64-25.02.2452.bin"
    strategy: script
    script: "nvswupdNVOS_bundle.sh"
    script_args: [bmc_ip, bmc_user, bmc_password, nvos_ip, nvos_user, nvos_password, fw_file]

strategy_config:
  script:
    script_dir: "scripts"
    timeout_seconds: 3600  # 1 hour max for each script

  redfish:
    poll_interval_seconds: 10
    poll_timeout_seconds: 1800  # 30 minutes for BMC/BIOS updates

  ssh:
    remote_dir: "/home/admin"
    reboot_timeout_seconds: 600  # 10 minutes for NVOS reboot
