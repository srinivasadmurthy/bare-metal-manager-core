syntax = "proto3";

import "google/protobuf/timestamp.proto";

import "nico_nico.proto";
import "machine_discovery_nico.proto";

option go_package = "github.com/NVIDIA/infra-controller-rest/workflow-schema/proto";

package workflows.v1.machine;

// DpuMachine - wrapper proto object for including DPU network configuration for Machine
message DpuMachine {
  // Machine object
  forge.Machine machine = 1;
  // DPU network configuration
  forge.ManagedHostNetworkConfigResponse dpu_network_config = 2;
}
