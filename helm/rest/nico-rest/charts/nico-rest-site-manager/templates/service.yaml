apiVersion: v1
kind: Service
metadata:
  name: {{ include "nico-rest-site-manager.name" . }}
  namespace: {{ include "nico-rest-site-manager.namespace" . }}
  labels:
    {{- include "nico-rest-site-manager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: https
  selector:
    {{- include "nico-rest-site-manager.selectorLabels" . | nindent 4 }}
