replicaCount: 1

nameOverride: ""
namespaceOverride: ""

image:
  name: nico-rest-site-manager

service:
  type: ClusterIP
  port: 8100

args:
  listenPort: 8100
  credsManagerUrl: "https://nico-rest-cert-manager.nico-rest:8000"
  tlsCertPath: /etc/tls/tls.crt
  tlsKeyPath: /etc/tls/tls.key
  debug: true

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"

certificate:
  enabled: true
  secretName: site-manager-tls
  duration: 2160h
  renewBefore: 360h
  commonName: nico-rest-site-manager
  # -- Fully override the certificate dnsNames. When empty, dnsNames are
  # generated from the chart name and namespace (plus localhost).
  dnsNames: []
  # -- SPIFFE/SAN URIs for the certificate. When empty, no uris are set.
  uris: []
  subject:
    # -- List of organizations for the certificate subject
    organizations: []
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048

rbac:
  create: true
