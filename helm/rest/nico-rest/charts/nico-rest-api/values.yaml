replicaCount: 1

nameOverride: ""
namespaceOverride: ""

image:
  name: nico-rest-api

service:
  type: ClusterIP
  port: 8388
  metricsPort: 9360

nodePort:
  enabled: false
  port: 30388

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

secrets:
  temporalEncryptionKey: temporal-encryption-key
  temporalClientCerts: temporal-client-cloud-certs
  # -- Only required when keycloak is enabled
  keycloakClientSecret: keycloak-client-secret
  # -- Secret containing DB password at key "password". When set, db.password is ignored
  # and the password is read from /var/secrets/db/password (supports live rotation).
  # Created by nico-prereqs ESO (nico-rest-db-eso) when rest.enabled=true.
  dbCreds: db-creds

config:
  env:
    dev: true
    disconnected: true
  api:
    name: nico
    route:
      version: v2
  log:
    level: debug
    sentry:
      dsn: ""
  db:
    host: nico-pg-cluster.postgres.svc.cluster.local
    port: 5432
    name: nico_rest
    user: nico-rest.nico
    # -- Plain-text password. Ignored when secrets.dbCreds is set.
    password: ""
  temporal:
    host: temporal-frontend.temporal
    port: 7233
    serverName: server.temporal.local
    namespace: cloud
    queue: cloud
    tls:
      enabled: true
      certPath: /var/secrets/temporal/certs/tls.crt
      keyPath: /var/secrets/temporal/certs/tls.key
      caPath: /var/secrets/temporal/certs/ca.crt
      disableHostVerification: false
    encryptionKeyPath: /var/secrets/temporal/encryption-key
  siteManager:
    enabled: true
    svcEndpoint: "https://nico-rest-site-manager:8100/v1/site"
  metrics:
    enabled: true
    port: 9360
  tracing:
    enabled: false
    serviceName: nico-rest-api
  # -- JWT issuers for authentication (mutually exclusive with keycloak)
  # When keycloak is disabled, at least one issuer must be configured.
  # Example:
  #   issuers:
  #     - name: my-idp
  #       origin: custom
  #       jwks: https://my-idp.example.com/.well-known/jwks.json
  #       issuer: "my-idp.example.com"
  issuers: []
  # -- Keycloak authentication (mutually exclusive with issuers)
  keycloak:
    enabled: false
    baseURL: ""
    externalBaseURL: ""
    realm: ""
    clientID: ""
    clientSecretPath: /var/secrets/keycloak/client-secret
    serviceAccount: false
  rateLimiter:
    enabled: false
    rate: 10.0
    burst: 30
    expiresIn: 180
