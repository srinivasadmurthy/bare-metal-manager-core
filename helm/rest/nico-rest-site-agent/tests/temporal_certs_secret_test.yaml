suite: temporal client certificate persistence
templates:
  - temporal-certs-secret.yaml
release:
  namespace: nico-rest
skip:
  minimumVersion: 0.5.1
tests:
  - it: creates empty placeholders on install
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - notExists:
          path: stringData
      - equal:
          path: data
          value:
            otp: ""
            cacertificate: ""
            certificate: ""
            key: ""

  - it: preserves populated credentials on upgrade
    release:
      namespace: nico-rest
      upgrade: true
    kubernetesProvider:
      scheme:
        "v1/Secret":
          gvr:
            version: v1
            resource: secrets
          namespaced: true
      objects:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: temporal-client-site-agent-certs
            namespace: nico-rest
          data:
            otp: b3Rw
            cacertificate: Y2E=
            certificate: Y2VydA==
            key: a2V5
    asserts:
      - notExists:
          path: stringData
      - equal:
          path: data
          value:
            otp: b3Rw
            cacertificate: Y2E=
            certificate: Y2VydA==
            key: a2V5
