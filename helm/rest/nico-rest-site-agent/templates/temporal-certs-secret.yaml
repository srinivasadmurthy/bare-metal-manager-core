# Temporal client TLS certs for site-agent. The bootstrap process populates these
# placeholders, and lookup preserves those values across Helm upgrades.
{{- $namespace := include "nico-rest-site-agent.namespace" . }}
{{- $secretName := .Values.secrets.temporalClientCerts }}
{{- $existing := lookup "v1" "Secret" $namespace $secretName | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "nico-rest-site-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  otp: {{ dig "data" "otp" "" $existing | quote }}
  cacertificate: {{ dig "data" "cacertificate" "" $existing | quote }}
  certificate: {{ dig "data" "certificate" "" $existing | quote }}
  key: {{ dig "data" "key" "" $existing | quote }}
