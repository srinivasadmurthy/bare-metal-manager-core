apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nico-ntp.name" . }}
  namespace: {{ include "nico-ntp.namespace" . }}
  labels:
    {{- include "nico-ntp.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nico-ntp.name" . }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "nico-ntp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nico-ntp.labels" . | nindent 8 }}
    spec:
      {{- with (.Values.imagePullSecrets | default .Values.global.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.affinity }}
        {{- toYaml .Values.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ include "nico-ntp.name" . }}
                topologyKey: kubernetes.io/hostname
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: chrony
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 123
              protocol: UDP
              name: ntp
          env:
            - name: NTP_SERVERS
              value: {{ include "nico-ntp.ntpServers" . | quote }}
            - name: NTP_DIRECTIVES
              value: {{ include "nico-ntp.ntpDirectives" . | quote }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
