apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nico-bmc-proxy.name" . }}-config-files
  namespace: {{ include "nico-bmc-proxy.namespace" . }}
  labels:
    {{- include "nico-bmc-proxy.labels" . | nindent 4 }}
data:
  # Both filenames populated for dual carbide/nico image support.
  carbide-bmc-proxy.toml: |
    {{- if .Values.configFiles.nicoBmcProxyConfig }}
    {{- .Values.configFiles.nicoBmcProxyConfig | nindent 4 }}
    {{- else }}
    {{- tpl (.Files.Get "files/carbide-bmc-proxy.toml") . | nindent 4 }}
    {{- end }}
  nico-bmc-proxy.toml: |
    {{- if .Values.configFiles.nicoBmcProxyConfig }}
    {{- .Values.configFiles.nicoBmcProxyConfig | nindent 4 }}
    {{- else }}
    {{- tpl (.Files.Get "files/carbide-bmc-proxy.toml") . | nindent 4 }}
    {{- end }}
{{- if .Values.databaseConfig }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.envFrom.databaseConfig.configMapName }}
  namespace: {{ include "nico-bmc-proxy.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    {{- include "nico-bmc-proxy.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.databaseConfig }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
