apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nico-pxe.name" . }}
  namespace: {{ include "nico-pxe.namespace" . }}
  labels:
    {{- include "nico-pxe.labels" . | nindent 4 }}
  annotations:
    {{- tpl (toYaml .Values.annotations) . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "nico-pxe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nico-pxe.labels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: {{ include "nico-pxe.name" . }}
    spec:
      serviceAccountName: {{ include "nico-pxe.name" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.initContainers .Values.bootArtifactContainers }}
      initContainers:
        {{- range .Values.bootArtifactContainers }}
        - name: {{ .name }}
          image: {{ .image }}
          {{- with .command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .imagePullPolicy }}
          imagePullPolicy: {{ . }}
          {{- end }}
          volumeMounts:
            - name: boot-artifacts
              mountPath: /boot-artifacts/blobs/internal
            {{- with .volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "nico-pxe.name" . }}
          image: "{{ include "nico-pxe.image" . }}"
          # Pick whichever binary is in the image (nico-named or carbide-named).
          command:
            - /bin/sh
            - -c
            - |
              if [ -x /opt/nico/nico ]; then BIN=/opt/nico/nico; else BIN=/opt/carbide/carbide; fi
              exec "$BIN" -s {{ .Values.bootArtifacts.servePath }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.envFrom }}
          envFrom:
            - configMapRef:
                name: {{ include "nico-pxe.name" . }}-env-config
                optional: {{ .Values.envFrom.pxeEnvConfig.optional | default true }}
          {{- end }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: spiffe
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            {{- if .Values.bootArtifactContainers }}
            - name: boot-artifacts
              mountPath: /boot-artifacts/blobs/internal
              readOnly: true
            {{- end }}
      volumes:
        - name: spiffe
          secret:
            secretName: {{ include "nico-pxe.name" . }}-certificate
        {{- if .Values.bootArtifactContainers }}
        - name: boot-artifacts
          emptyDir: {}
        {{- end }}
