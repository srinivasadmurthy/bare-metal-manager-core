apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nico-api.name" . }}
  namespace: {{ include "nico-api.namespace" . }}
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
  annotations:
    {{- tpl (toYaml .Values.annotations) . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "nico-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nico-api.labels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: {{ include "nico-api.name" . }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      serviceAccountName: {{ include "nico-api.name" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.initContainers .Values.bootArtifactContainers }}
      initContainers:
        {{- range .Values.bootArtifactContainers }}
        - name: {{ .name }}
          image: {{ .image }}
          {{- with .command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .imagePullPolicy }}
          imagePullPolicy: {{ . }}
          {{- end }}
          volumeMounts:
            - name: boot-artifacts
              mountPath: /boot-artifacts/blobs/internal
            {{- with .volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "nico-api.name" . }}
          image: "{{ include "nico-api.image" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          command:
            {{- toYaml .Values.command | nindent 12 }}
          env:
            - name: VAULT_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.envFrom.vaultApproleTokens.secretName }}
                  key: VAULT_ROLE_ID
                  optional: true
            - name: VAULT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.envFrom.vaultApproleTokens.secretName }}
                  key: VAULT_SECRET_ID
                  optional: true
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.envFrom.vaultToken.secretName }}
                  key: token
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.vaultClusterInfo.configMapName }}
                  key: VAULT_SERVICE
            - name: VAULT_KV_MOUNT_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.vaultClusterInfo.configMapName }}
                  key: NICO_VAULT_MOUNT
            - name: VAULT_PKI_MOUNT_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.vaultClusterInfo.configMapName }}
                  key: NICO_VAULT_PKI_MOUNT
            - name: VAULT_PKI_ROLE_NAME
              value: {{ .Values.env.VAULT_PKI_ROLE_NAME | quote }}
            - name: DATASTORE_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ .Values.envFrom.databaseCredentials.secretName }}
            - name: DATASTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ .Values.envFrom.databaseCredentials.secretName }}
            - name: DATASTORE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.databaseConfig.configMapName }}
                  key: DB_HOST
            - name: DATASTORE_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.databaseConfig.configMapName }}
                  key: DB_PORT
            - name: DATASTORE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.databaseConfig.configMapName }}
                  key: DB_NAME
            # Set both CARBIDE_* (carbide image) and NICO_* (nico image) names so the
            # chart works with either image variant; binary reads only its expected name.
            - name: CARBIDE_API_DATABASE_URL
              value: "postgres://$(DATASTORE_USER):$(DATASTORE_PASSWORD)@$(DATASTORE_HOST):$(DATASTORE_PORT)/$(DATASTORE_NAME)"
            - name: NICO_API_DATABASE_URL
              value: "postgres://$(DATASTORE_USER):$(DATASTORE_PASSWORD)@$(DATASTORE_HOST):$(DATASTORE_PORT)/$(DATASTORE_NAME)"
            - name: CARBIDE_WEB_PRIVATE_COOKIEJAR_KEY
              value: "$(DATASTORE_PASSWORD)"
            - name: NICO_WEB_PRIVATE_COOKIEJAR_KEY
              value: "$(DATASTORE_PASSWORD)"
            - name: CARBIDE_WEB_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.nicoWebHostname.configMapName }}
                  key: hostname
            - name: NICO_WEB_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.envFrom.nicoWebHostname.configMapName }}
                  key: hostname
            - name: RUST_BACKTRACE
              value: {{ .Values.env.RUST_BACKTRACE | quote }}
            - name: RUST_LIB_BACKTRACE
              value: {{ .Values.env.RUST_LIB_BACKTRACE | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpc.port }}
            - name: metrics
              containerPort: {{ .Values.service.metrics.port }}
            - name: profiler
              containerPort: {{ .Values.service.profiler.port }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          volumeMounts:
            # Mount config + secrets at both legacy /etc/forge,/var/run/secrets/forge-roots,/opt/carbide
            # and renamed /etc/nico,/var/run/secrets/nico-roots,/opt/nico paths so the chart works
            # whether the binary inside the image looks up its files under forge/carbide or nico names.
            - name: {{ include "nico-api.name" . }}-config-files
              mountPath: /etc/forge/carbide-api
            - name: {{ include "nico-api.name" . }}-config-files
              mountPath: /etc/nico/nico-api
            - name: {{ include "nico-api.name" . }}-site-config-files
              mountPath: /etc/forge/carbide-api/site
            - name: {{ include "nico-api.name" . }}-site-config-files
              mountPath: /etc/nico/nico-api/site
            - name: persistence
              mountPath: /mnt/persistence
            - name: spiffe
              mountPath: "/var/run/secrets/spiffe.io"
              readOnly: true
            - name: nico-roots
              mountPath: "/var/run/secrets/forge-roots"
              readOnly: true
            - name: nico-roots
              mountPath: "/var/run/secrets/nico-roots"
              readOnly: true
            - name: firmware
              mountPath: "/opt/carbide/firmware"
              readOnly: true
            - name: firmware
              mountPath: "/opt/nico/firmware"
              readOnly: true
            {{- if .Values.bootArtifactContainers }}
            - name: boot-artifacts
              mountPath: /boot-artifacts/blobs/internal
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: {{ include "nico-api.name" . }}-config-files
          configMap:
            name: {{ include "nico-api.name" . }}-config-files
        - name: {{ include "nico-api.name" . }}-site-config-files
          configMap:
            name: {{ include "nico-api.name" . }}-site-config-files
        - name: persistence
          emptyDir: {}
        - name: spiffe
          secret:
            secretName: {{ include "nico-api.name" . }}-certificate
        - name: nico-roots
          secret:
            secretName: nico-roots
        - name: firmware
          emptyDir: {}
        {{- if .Values.bootArtifactContainers }}
        - name: boot-artifacts
          emptyDir: {}
        {{- end }}
