apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nico-api.name" . }}-config-files
  namespace: {{ include "nico-api.namespace" . }}
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
data:
  # Both filenames are populated with the same content so the chart works
  # whether the binary expects carbide-api-config.toml or nico-api-config.toml.
  carbide-api-config.toml: |
    {{- if .Values.configFiles.nicoApiConfig }}
    {{- .Values.configFiles.nicoApiConfig | nindent 4 }}
    {{- else }}
    {{- tpl (.Files.Get "files/carbide-api-config.toml") . | nindent 4 }}
    {{- end }}
  nico-api-config.toml: |
    {{- if .Values.configFiles.nicoApiConfig }}
    {{- .Values.configFiles.nicoApiConfig | nindent 4 }}
    {{- else }}
    {{- tpl (.Files.Get "files/carbide-api-config.toml") . | nindent 4 }}
    {{- end }}
  casbin-policy.csv: |
    {{- if .Values.configFiles.casbinPolicy }}
    {{- .Values.configFiles.casbinPolicy | nindent 4 }}
    {{- else }}
    {{- tpl (.Files.Get "files/casbin-policy.csv") . | nindent 4 }}
    {{- end }}
{{- if .Values.siteConfig.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nico-api.name" . }}-site-config-files
  namespace: {{ include "nico-api.namespace" . }}
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
data:
  # Both filenames populated for dual carbide/nico image support.
  carbide-api-site-config.toml: {{ .Values.siteConfig.nicoApiSiteConfig | default "" | quote }}
  nico-api-site-config.toml:    {{ .Values.siteConfig.nicoApiSiteConfig | default "" | quote }}
{{- end }}
{{- if .Values.vaultClusterInfo }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.envFrom.vaultClusterInfo.configMapName }}
  namespace: {{ include "nico-api.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.vaultClusterInfo }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- if .Values.databaseConfig }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.envFrom.databaseConfig.configMapName }}
  namespace: {{ include "nico-api.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/resource-policy: keep
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.databaseConfig }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
---
## Hostname ConfigMap — always created (site-specific, not tied to Vault/DB infrastructure)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.envFrom.nicoWebHostname.configMapName }}
  namespace: {{ include "nico-api.namespace" . }}
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
data:
  hostname: {{ .Values.hostname | default "nico.local" | quote }}
