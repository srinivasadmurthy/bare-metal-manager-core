{{- if .Values.externalService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: carbide-bmc-proxy-external
  namespace: {{ include "carbide-bmc-proxy.namespace" . }}
  labels:
    {{- include "carbide-bmc-proxy.labels" . | nindent 4 }}
  {{- with .Values.externalService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.externalService.type }}
  externalTrafficPolicy: {{ .Values.externalService.externalTrafficPolicy }}
  selector:
    {{- include "carbide-bmc-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - name: proxy
      port: {{ .Values.service.proxy.port }}
      targetPort: proxy
      protocol: TCP
{{- end }}
