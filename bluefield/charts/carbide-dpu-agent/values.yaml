### DPF contract ###
serviceDaemonSet:
  nodeSelector:
  labels: {}
  annotations: {}
  updateStrategy: {}
  resources: {}
exposedPorts:
  labels: {}
  ports: {}

### Service specific values ###
image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""
imagePullSecrets: []
podSecurityContext: {}
securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - SYS_ADMIN
      - DAC_OVERRIDE
      - NET_RAW
tolerations: []

### Values for agent operation
hbn:
  nvue_https_address: "nvue"
  nvue_credentials_secret_name: ""
  nvue_username_key: "username"
  nvue_password_key: "password"
discovery:
  hardware_file: "/etc/carbide/discovery_info.json"
dhcp_server:
  # If interface_prepend is set to a non-empty string, it will
  # be turned into a --dhcp-server-interface-prepend argument.
  interface_prepend: ""
