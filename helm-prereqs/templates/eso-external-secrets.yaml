{{- if .Values.externalSecrets.enabled }}
## =============================================================================
## nico-roots — sync site-root CA cert to all nico-managed namespaces.
## Source: site-root Secret in cert-manager namespace.
## Target: nico-roots Secret in every namespace labeled
##         nico.nvidia.com/managed=true
## creationPolicy: Orphan — ESO syncs value but does not set ownerReference,
##   so GC never cascades a delete to nico-roots if the ExternalSecret churns.
## =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: nico-roots-eso
spec:
  namespaceSelector:
    matchLabels:
      nico.nvidia.com/managed: "true"
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: cert-manager-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: nico-roots
      creationPolicy: Orphan
      template:
        type: Opaque
        data:
          ca.crt: "{{`{{ .site_ca }}`}}"
    data:
      - secretKey: site_ca
        remoteRef:
          key: site-root
          property: ca.crt

## =============================================================================
## nico-db-eso — sync operator-generated DB credentials → nico-system.
## Source: nico-system.nico.nico-pg-cluster.credentials.postgresql.acid.zalan.do
##         in postgres namespace (created automatically by Zalando operator).
## Target: nico-system.nico.nico-pg-cluster.credentials in nico-system
##         (same name nico-api reads — application side unchanged).
## =============================================================================
{{- if .Values.postgresql.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: nico-db-eso
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: ["{{ .Values.namespace }}"]
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: postgres-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: nico-system.nico.nico-pg-cluster.credentials
      deletionPolicy: Retain
    dataFrom:
      - extract:
          key: nico-system.nico.nico-pg-cluster.credentials.postgresql.acid.zalan.do
          version: v1
{{- end }}

## =============================================================================
## nico-rest-db-eso — sync operator-generated REST DB credentials → nico-rest.
## Source: nico-rest.nico.nico-pg-cluster.credentials.postgresql.acid.zalan.do
##         in postgres namespace (created automatically by Zalando operator).
## Target: nico-rest-pg-creds Secret in nico-rest namespace.
##
## Named nico-rest-pg-creds (not db-creds) to avoid a collision with the
## db-creds Secret that nico-rest-common creates as a weight-10 pre-install
## hook: that hook has hook-delete-policy before-hook-creation, so Helm would
## delete ESO's copy just before recreating it from chart values. setup.sh
## reads nico-rest-pg-creds and injects the Zalando-generated password into
## nico-rest-common.secrets.dbCreds.password at helm install time.
## =============================================================================
{{- if and .Values.postgresql.enabled .Values.rest.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: nico-rest-db-eso
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: ["{{ .Values.rest.namespace }}"]
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: postgres-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: nico-rest-pg-creds
      deletionPolicy: Retain
    dataFrom:
      - extract:
          key: nico-rest.nico.nico-pg-cluster.credentials.postgresql.acid.zalan.do
          version: v1
{{- end }}

{{/*
  flow/psm/nsm DB credential syncs.
  The Zalando operator generates one Secret per (user, cluster) pair in the
  postgres namespace; ESO extracts each and projects it into the flow
  namespace under the short name the flow chart consumes.
*/}}
{{- if and .Values.postgresql.enabled .Values.flow.enabled }}
{{- range $svc := list "flow" "psm" "nsm" }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: {{ printf "%s-db-eso" $svc }}
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: ["{{ $.Values.flow.namespace }}"]
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: postgres-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: {{ printf "%s.nico.nico-pg-cluster.credentials" $svc }}
      deletionPolicy: Retain
    dataFrom:
      - extract:
          key: {{ printf "%s.nico.nico-pg-cluster.credentials.postgresql.acid.zalan.do" $svc }}
          version: v1
{{- end }}
{{- end }}
{{- end }}
