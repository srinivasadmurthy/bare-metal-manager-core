{{- if .Values.postgresql.enabled }}
## =============================================================================
## nico-pg-cluster-env — injected into every postgres pod as env vars.
## Created here (nico-prereqs chart) so Values.siteName flows in at install.
## Namespace: postgres (operator namespace, not nico-system).
## =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nico-pg-cluster-env
  namespace: {{ .Values.postgresNamespace }}
data:
  TMP_SITE: {{ .Values.siteName | quote }}

## =============================================================================
## nico-pg-cluster — 3-node HA PostgreSQL managed by Zalando postgres-operator.
##
## Operator (acid.zalan.do) runs in the postgres namespace and creates the
## StatefulSet, Services, and per-user credential Secrets there.
##
## DB credentials are generated by the operator and distributed to nico-system
## via ESO (ClusterExternalSecret nico-db-eso in eso-external-secrets.yaml).
## =============================================================================
---
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: nico-pg-cluster
  namespace: {{ .Values.postgresNamespace }}
spec:
  teamId: nico
  volume:
    size: {{ .Values.postgresql.volumeSize }}
    storageClass: {{ .Values.postgresql.storageClass | quote }}
  numberOfInstances: {{ .Values.postgresql.instances }}
  resources:
    limits:
      cpu: {{ .Values.postgresql.resources.limits.cpu | quote }}
      memory: {{ .Values.postgresql.resources.limits.memory | quote }}
    requests:
      cpu: {{ .Values.postgresql.resources.requests.cpu | quote }}
      memory: {{ .Values.postgresql.resources.requests.memory | quote }}
  users:
    nico-system.nico:
      - superuser
      - createdb
    {{- if .Values.rest.enabled }}
    nico-rest.nico:
      - superuser
      - createdb
    {{- end }}
    {{- if .Values.flow.enabled }}
    flow.nico:
      - superuser
      - createdb
    psm.nico:
      - superuser
      - createdb
    nsm.nico:
      - superuser
      - createdb
    {{- end }}
  databases:
    nico_system_nico: nico-system.nico
    {{- if .Values.rest.enabled }}
    nico_rest: nico-rest.nico
    {{- end }}
    {{- if .Values.flow.enabled }}
    flow: flow.nico
    psm: psm.nico
    nsm: nsm.nico
    {{- end }}
  patroni:
    synchronous_mode: true
    synchronous_mode_strict: true
    synchronous_node_count: 1
  postgresql:
    version: "15"
    parameters:
      max_connections: "1024"
      synchronous_commit: "remote_apply"
      lock_timeout: "2min"
      statement_timeout: "10min"
      idle_in_transaction_session_timeout: "15min"
      idle_session_timeout: "60min"
  sidecars:
    - name: postgres-exporter
      image: "quay.io/prometheuscommunity/postgres-exporter:latest"
      ports:
        - containerPort: 9187
          protocol: TCP
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 200Mi
      env:
        - name: DATA_SOURCE_URI
          value: "nico-pg-cluster.{{ .Values.postgresNamespace }}.svc.cluster.local/postgres?sslmode=require"
        - name: DATA_SOURCE_USER
          valueFrom:
            secretKeyRef:
              name: postgres.nico-pg-cluster.credentials.postgresql.acid.zalan.do
              key: username
        - name: DATA_SOURCE_PASS
          valueFrom:
            secretKeyRef:
              name: postgres.nico-pg-cluster.credentials.postgresql.acid.zalan.do
              key: password
        - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
          value: "true"
{{- end }}
