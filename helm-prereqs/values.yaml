## =============================================================================
## nico-prereqs — default values
## See NICO_PREREQS.md for full documentation.
## =============================================================================

## Site identifier - injected into postgres pods as TMP_SITE env var via
## the nico-pg-cluster-env ConfigMap.
## Override per site: --set siteName=<sitename>
## REQUIRED: set your short site identifier (preflight fails while empty/TMP_SITE).
siteName: ""

## Target namespace — must match the namespace used for helm install nico
namespace: nico-system

## Operator namespaces — must match the namespaces used in helmfile.yaml
certManagerNamespace: cert-manager
vaultNamespace: vault
vaultServiceIP: ""    # injected by setup.sh — vault ClusterIP for IP SAN in TLS cert
esoNamespace: external-secrets
postgresNamespace: postgres

## ---------------------------------------------------------------------------
## Kubernetes API server URL for ESO ClusterSecretStore (Kubernetes provider).
## Default empty = ESO uses kubernetes.default (DNS). Set to ClusterIP on clusters
## where NodeLocal DNSCache is missing (e.g. bare-metal without DNS DaemonSet).
## Detected automatically by setup.sh via kubectl get svc kubernetes -n default.
clusterApiServer: ""

## ---------------------------------------------------------------------------
## Vault connection (used by vault-pki-config Job and vault-nico-issuer)
## Vault address uses vaultNamespace above: vault.<vaultNamespace>.svc.cluster.local
## ---------------------------------------------------------------------------
vault:
  address: "https://vault.vault.svc.cluster.local:8200"
  ## setup.sh/helmfile supplies this dynamically from vaultroottoken.
  ## Direct Helm users should set this when tokenSecret.create=true, or
  ## pre-create nico-system/nico-vault-token and set tokenSecret.create=false.
  token: ""
  tokenSecret:
    create: true
  approleSecret:
    create: true
  configJob:
    enabled: true
    vaultImage: "hashicorp/vault:1.17"
    kubectlImage: "bitnami/kubectl:latest"
  tls:
    create: true
  pkiMount: "nicoca"
  pkiRole: "nico-cluster"
  nicoCliClientRole:
    enabled: true                # create the admin-cli PKI client role at install
    name: "nico-cli-client"
    ## SubjectOU stamped on issued CLI client certs = the ExternalUser "group" nico-api
    ## authorizes. Must match the group the build's ForgeAdminCLI principal expects.
    ## Empty = use `name`. (Current builds hardcode "Invalid" — set ou: "Invalid" until the
    ## code fix lands; pair with nico-api auth.additionalIssuerCns: ["site-root"].)
    ou: "Invalid"                # BUILD-SPECIFIC (not site): match this build's hardcoded ForgeAdminCLI group
    organization: ""
  ## Kubernetes auth role for nico-api to read and manage Vault KV
  ## credentials used by SiteExplorer and related credential flows.
  ## Required by the carbide-api binary — without this role, SiteExplorer
  ## cannot authenticate to Vault and BMC credential lookups fail every cycle.
  nicoApiK8sAuth:
    enabled: true
    serviceAccountName: "nico-api"
    tokenTTL: "1h"
  kvMount: "secrets"
  ## Seed KV-v2 entries written after the KV mount is enabled. Mirrors the
  ## publicly-documented DPU factory defaults that the Terraform path
  ## (forged/terraform/v2/modules/vault) writes via vault_kv_secret_v2.
  ## Set kvSeeds: [] to disable seeding.
  kvSeeds:
    - path: "machines/all_dpus/factory_default/bmc-metadata-items/root"
      data:
        UsernamePassword:
          username: "root"
          password: "0penBmc"
    - path: "machines/all_dpus/factory_default/uefi-metadata-items/auth"
      data:
        UsernamePassword:
          username: ""
          password: "bluefield"
    ## site_default UEFI creds — seed these so site-explorer finds them. Without these,
    ## `credential add-uefi` only writes Vault metadata (not the value) and preingestion
    ## logs "Missing credential machines/all_{dpus,hosts}/site_default/uefi-metadata-items/auth".
    ## SITE-SPECIFIC SECRET: blank the passwords before committing/MR; operator populates per site.
    - path: "machines/all_dpus/site_default/uefi-metadata-items/auth"
      data:
        UsernamePassword:
          username: ""
          password: ""          # SITE SECRET: your DPU UEFI password — populate per site
    - path: "machines/all_hosts/site_default/uefi-metadata-items/auth"
      data:
        UsernamePassword:
          username: ""
          password: ""          # SITE SECRET: your host UEFI password — populate per site

certManager:
  siteRoot:
    create: true
  vaultAuthServiceAccount:
    create: true
  vaultIssuer:
    create: true

externalSecrets:
  enabled: true

sshHostKey:
  create: true

azureSSOClientSecret: ""
azureSSOClientSecretSecret:
  create: true

## ---------------------------------------------------------------------------
## Image pull secrets — NGC API keys
## Set via --set or export before running setup.sh
## ---------------------------------------------------------------------------
imagePullSecrets:
  ngcCarbidePull: ""     # nvcr.io/0837451325059433/carbide-dev
  ngcNvidianKey: ""      # nvcr.io/nvidian/nvforge (optional, for unbound)

## ---------------------------------------------------------------------------
## flow — NICo Flow (rack lifecycle orchestrator, formerly RLA).
##
## This toggle controls only the helm-prereqs side of Flow:
##   - per-component databases (flow / psm / nsm) on nico-pg-cluster
##   - ClusterExternalSecrets that sync those DB credentials into the flow
##     namespace (eso-external-secrets.yaml)
##   - psm/nsm Vault tokens (flow-vault-tokens-job post-install hook)
##
## The flow Deployment itself ships as a separate helm release from
## helm/charts/nico-flow, installed by setup.sh phase 7i. That phase is NOT
## driven by this value — it is unconditionally invoked unless setup.sh is
## passed --skip-flow. If you set flow.enabled=false here you should also
## pass --skip-flow on the setup.sh command line, otherwise phase 7i will
## try to install a chart whose prerequisites (DB creds, Vault tokens) are
## missing and fail.
## ---------------------------------------------------------------------------
flow:
  enabled: true
  ## Namespace flow runs in — must match the helm install -n flag for the
  ## flow release.  ESO and the vault-config-job target this namespace.
  namespace: flow

## ---------------------------------------------------------------------------
## PostgreSQL — Zalando postgres-operator HA cluster (3-node Patroni)
## Credentials are generated by the operator and distributed via ESO.
## ---------------------------------------------------------------------------
postgresql:
  enabled: true
  instances: 3
  volumeSize: "10Gi"
  storageClass: "local-path-persistent"
  ## DB_HOST in nico-system-nico-database-config ConfigMap.
  ## Points at the operator-managed Service in the postgres namespace.
  host: "nico-pg-cluster.postgres.svc.cluster.local"
  ## Resource limits for each postgres instance.
  ## Production uses 32 CPU / 16Gi — tune down for dev clusters.
  resources:
    limits:
      cpu: "4"
      memory: "4Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
