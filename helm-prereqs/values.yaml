## =============================================================================
## carbide-prereqs — default values
## See CARBIDE_PREREQS.md for full documentation.
## =============================================================================

## Site identifier - injected into postgres pods as TMP_SITE env var via
## the forge-pg-cluster-env ConfigMap.
## Override per site: --set siteName=<sitename>
siteName: "TMP_SITE"

## Target namespace — must match the namespace used for helm install carbide
namespace: forge-system

## Operator namespaces — must match the namespaces used in helmfile.yaml
certManagerNamespace: cert-manager
vaultNamespace: vault
vaultServiceIP: ""    # injected by setup.sh — vault ClusterIP for IP SAN in TLS cert
esoNamespace: external-secrets
postgresNamespace: postgres

## ---------------------------------------------------------------------------
## Kubernetes API server URL for ESO ClusterSecretStore (Kubernetes provider).
## Default empty = ESO uses kubernetes.default (DNS). Set to ClusterIP on clusters
## where NodeLocal DNSCache is missing (e.g. bare-metal without DNS DaemonSet).
## Detected automatically by setup.sh via kubectl get svc kubernetes -n default.
clusterApiServer: ""

## ---------------------------------------------------------------------------
## Vault connection (used by vault-pki-config Job and vault-forge-issuer)
## Vault address uses vaultNamespace above: vault.<vaultNamespace>.svc.cluster.local
## ---------------------------------------------------------------------------
vault:
  address: "https://vault.vault.svc.cluster.local:8200"
  ## setup.sh/helmfile supplies this dynamically from vaultroottoken.
  ## Direct Helm users should set this when tokenSecret.create=true, or
  ## pre-create forge-system/carbide-vault-token and set tokenSecret.create=false.
  token: ""
  tokenSecret:
    create: true
  approleSecret:
    create: true
  configJob:
    enabled: true
    vaultImage: "hashicorp/vault:1.17"
    kubectlImage: "bitnami/kubectl:latest"
  tls:
    create: true
  pkiMount: "forgeca"
  pkiRole: "forge-cluster"
  kvMount: "secrets"

certManager:
  siteRoot:
    create: true
  vaultAuthServiceAccount:
    create: true
  vaultIssuer:
    create: true

externalSecrets:
  enabled: true

sshHostKey:
  create: true

azureSSOClientSecret: ""
azureSSOClientSecretSecret:
  create: true

## ---------------------------------------------------------------------------
## Image pull secrets — NGC API keys
## Set via --set or export before running setup.sh
## ---------------------------------------------------------------------------
imagePullSecrets:
  ngcCarbidePull: ""     # nvcr.io/0837451325059433/carbide-dev
  ngcNvidianKey: ""      # nvcr.io/nvidian/nvforge (optional, for unbound)

## ---------------------------------------------------------------------------
## PostgreSQL — Zalando postgres-operator HA cluster (3-node Patroni)
## Credentials are generated by the operator and distributed via ESO.
## ---------------------------------------------------------------------------
postgresql:
  enabled: true
  instances: 3
  volumeSize: "10Gi"
  ## DB_HOST in forge-system-carbide-database-config ConfigMap.
  ## Points at the operator-managed Service in the postgres namespace.
  host: "forge-pg-cluster.postgres.svc.cluster.local"
  ## Resource limits for each postgres instance.
  ## Production uses 32 CPU / 16Gi — tune down for dev clusters.
  resources:
    limits:
      cpu: "4"
      memory: "4Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
